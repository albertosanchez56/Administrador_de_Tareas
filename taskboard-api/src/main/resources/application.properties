spring.application.name=taskboard-api

# PostgreSQL (valores por defecto para desarrollo local; sobreescribe con variables de entorno o un perfil)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskboard}
spring.datasource.driver-class-name=org.postgresql.Driver

# Esquema lo gestionarás con Flyway; Hibernate no debe crear tablas en runtime
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
